name: Generate Snake Animation

on:
  schedule:
    # Executa a cada 24 horas
    - cron: "0 0 * * *"
  # Permite rodar o script manualmente
  workflow_dispatch:

# ISSO AQUI É O QUE FALTA NA MAIORIA DOS VÍDEOS: Permissão para escrever no repositório
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: Platane/snk@v3
        with:
          # Puxa o seu nome de usuário automaticamente
          github_user_name: ${{ github.repository_owner }}
          
          # Gera o gif do oceano (como no seu README) e versões em SVG (mais nítidas)
          outputs: |
            dist/ocean.gif?color_snake=orange&color_dots=#bfd6f6,#8dbdff,#64a1f4,#4b91f1,#3c7dd9
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
